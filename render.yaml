services:
  # ── API (Express + Prisma) ──────────────────────────────────────────────────
  - type: web
    name: wc2026-api
    runtime: node
    rootDir: api
    buildCommand: npm install --include=dev && npx prisma generate && npm run build && npx prisma migrate deploy
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # Neon connection string
      # Set these manually in the Render dashboard after first deploy:
      - key: FRONTEND_URL
        sync: false          # e.g. https://wc2026-web.onrender.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false          # https://wc2026-api.onrender.com/auth/google/callback
      - key: FOOTBALL_DATA_API_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: CRON_API_KEY
        generateValue: true

  # ── Web (Next.js) ───────────────────────────────────────────────────────────
  - type: web
    name: wc2026-web
    runtime: node
    rootDir: web
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false          # https://wc2026-api.onrender.com

  # ── Cron: sync matches + score every 5 minutes ─────────────────────────────
  - type: cron
    name: wc2026-cron-sync
    runtime: node
    rootDir: api
    buildCommand: npm install && npm run build
    startCommand: node -e "
      const https = require('https');
      const url = new URL(process.env.API_URL + '/cron/sync');
      https.request(url, { method: 'POST', headers: { 'x-api-key': process.env.CRON_API_KEY } }, r => r.resume()).end();
      const url2 = new URL(process.env.API_URL + '/cron/score');
      https.request(url2, { method: 'POST', headers: { 'x-api-key': process.env.CRON_API_KEY } }, r => r.resume()).end();
    "
    schedule: "*/5 * * * *"
    plan: free
    envVars:
      - key: API_URL
        sync: false          # https://wc2026-api.onrender.com
      - key: CRON_API_KEY
        sync: false          # must match the value generated for wc2026-api

