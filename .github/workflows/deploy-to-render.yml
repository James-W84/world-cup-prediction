name: Deploy to Render

on:
  push:
    branches: [ master ]
  workflow_dispatch: {}

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    environment: deployment
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Validate web service secrets
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID_WEB: ${{ secrets.RENDER_SERVICE_ID_WEB }}
        run: |
          if [ -z "$RENDER_API_KEY" ]; then
            echo "Missing GitHub secret: RENDER_API_KEY" >&2
            exit 1
          fi
          if [ -z "$RENDER_SERVICE_ID_WEB" ]; then
            echo "Missing GitHub secret: RENDER_SERVICE_ID_WEB" >&2
            exit 1
          fi

      - id: create_deploy_web
        name: Trigger Render deploy (web)
        env:
          SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID_WEB }}
          COMMIT: ${{ github.sha }}
        run: |
          echo "Triggering deploy for web (service: $SERVICE_ID, commit: $COMMIT)"
          payload=$(jq -n --arg commit "$COMMIT" '{commitId: $commit}')
          http_status=$(curl -sS -o deploy_web_response.json -w "%{http_code}" -X POST "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$payload")
          resp=$(cat deploy_web_response.json)
          if [ "$http_status" -lt 200 ] || [ "$http_status" -ge 300 ]; then
            echo "Failed creating web deploy. HTTP $http_status"
            echo "$resp"
            exit 1
          fi
          if ! deploy_id=$(jq -er 'if type == "object" then .id // empty else empty end' deploy_web_response.json); then
            echo "Failed creating web deploy: response did not contain a deploy id. HTTP $http_status"
            echo "$resp"
            exit 1
          fi
          echo "deploy_id=$deploy_id" >> $GITHUB_OUTPUT

      - name: Wait for web deploy to complete
        env:
          SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID_WEB }}
        run: |
          deploy_id=${{ steps.create_deploy_web.outputs.deploy_id }}
          echo "Waiting for web deploy $deploy_id"
          for i in {1..60}; do
            http_status=$(curl -sS -o deploy_web_status.json -w "%{http_code}" -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$SERVICE_ID/deploys/$deploy_id")
            if [ "$http_status" -lt 200 ] || [ "$http_status" -ge 300 ]; then
              echo "Failed retrieving web deploy status. HTTP $http_status"
              cat deploy_web_status.json
              exit 1
            fi
            status=$(jq -er 'if type == "object" then .status // empty else empty end' deploy_web_status.json)
            echo "[$i] status=$status"
            if [ "$status" = "live" ]; then
              echo "Web deploy succeeded"
              exit 0
            fi
            if [ "$status" = "build_failed" ] || [ "$status" = "update_failed" ] || [ "$status" = "pre_deploy_failed" ] || [ "$status" = "canceled" ]; then
              echo "Web deploy failed"
              exit 1
            fi
            sleep 5
          done
          echo "Timed out waiting for web deploy"
          exit 1

  deploy-api:
    runs-on: ubuntu-latest
    environment: deployment
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Validate api service secrets
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID_API: ${{ secrets.RENDER_SERVICE_ID_API }}
        run: |
          if [ -z "$RENDER_API_KEY" ]; then
            echo "Missing GitHub secret: RENDER_API_KEY" >&2
            exit 1
          fi
          if [ -z "$RENDER_SERVICE_ID_API" ]; then
            echo "Missing GitHub secret: RENDER_SERVICE_ID_API" >&2
            exit 1
          fi

      - id: create_deploy_api
        name: Trigger Render deploy (api)
        env:
          SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID_API }}
          COMMIT: ${{ github.sha }}
        run: |
          echo "Triggering deploy for api (service: $SERVICE_ID, commit: $COMMIT)"
          payload=$(jq -n --arg commit "$COMMIT" '{commitId: $commit}')
          http_status=$(curl -sS -o deploy_api_response.json -w "%{http_code}" -X POST "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$payload")
          resp=$(cat deploy_api_response.json)
          if [ "$http_status" -lt 200 ] || [ "$http_status" -ge 300 ]; then
            echo "Failed creating api deploy. HTTP $http_status"
            echo "$resp"
            exit 1
          fi
          if ! deploy_id=$(jq -er 'if type == "object" then .id // empty else empty end' deploy_api_response.json); then
            echo "Failed creating api deploy: response did not contain a deploy id. HTTP $http_status"
            echo "$resp"
            exit 1
          fi
          echo "deploy_id=$deploy_id" >> $GITHUB_OUTPUT

      - name: Wait for api deploy to complete
        env:
          SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID_API }}
        run: |
          deploy_id=${{ steps.create_deploy_api.outputs.deploy_id }}
          echo "Waiting for api deploy $deploy_id"
          for i in {1..60}; do
            http_status=$(curl -sS -o deploy_api_status.json -w "%{http_code}" -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$SERVICE_ID/deploys/$deploy_id")
            if [ "$http_status" -lt 200 ] || [ "$http_status" -ge 300 ]; then
              echo "Failed retrieving api deploy status. HTTP $http_status"
              cat deploy_api_status.json
              exit 1
            fi
            status=$(jq -er 'if type == "object" then .status // empty else empty end' deploy_api_status.json)
            echo "[$i] status=$status"
            if [ "$status" = "live" ]; then
              echo "API deploy succeeded"
              exit 0
            fi
            if [ "$status" = "build_failed" ] || [ "$status" = "update_failed" ] || [ "$status" = "pre_deploy_failed" ] || [ "$status" = "canceled" ]; then
              echo "API deploy failed"
              exit 1
            fi
            sleep 5
          done
          echo "Timed out waiting for api deploy"
          exit 1
